<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Monse 💖</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6e7,#fff0f6);
font-family:'Segoe UI',cursive;
overflow:hidden;
}

/* transición */
#inicio{
text-align:center;
transition:opacity 0.6s ease;
}

/* partículas */
.particle{
position:absolute;
font-size:18px;
animation:floatUp linear infinite;
pointer-events:none;
}
@keyframes floatUp{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* regalo */
.box{
width:120px;
height:120px;
background:#ff8fc1;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
font-size:40px;
color:white;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
animation:float 2s infinite;
margin:auto;
}
@keyframes float{50%{transform:translateY(-10px)}}

/* mensaje */
.msg{
display:none;
background:white;
padding:20px;
border-radius:20px;
margin-top:20px;
}

/* botón */
.btn{
margin-top:15px;
padding:12px 20px;
background:#ff4da6;
color:white;
border:none;
border-radius:25px;
font-size:18px;
cursor:pointer;
}

/* vela */
.vela{
font-size:60px;
transition:0.3s;
}

/* humo */
.humo{
position:absolute;
font-size:20px;
animation:smoke 2s forwards;
}
@keyframes smoke{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-80px);opacity:0;}
}

/* carta */
#cartaFinal{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scaleY(0);
transform-origin:top;
background:white;
padding:25px;
border-radius:20px;
width:85%;
max-width:340px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
text-align:center;
opacity:0;
display:none;
z-index:999;
}

/* animación */
@keyframes abrir{
0%{transform:translate(-50%,-50%) scaleY(0);opacity:0;}
100%{transform:translate(-50%,-50%) scaleY(1);opacity:1;}
}

/* typing */
.typing{
white-space:pre-line;
border-right:2px solid pink;
animation:blink 0.7s infinite;
}
@keyframes blink{
50%{border-color:transparent}
}
</style>
</head>

<body>

<div id="inicio">

<div class="box" onclick="abrir()">🎁</div>

<div id="msg1" class="msg">
Esto fue hecho especialmente para ti 💖<br><br>
Gracias por existir y ser tú ✨
</div>

<div id="cake" style="display:none;">
<div id="vela" class="vela">🎂</div>
<button class="btn" onclick="iniciarSoplido()">Sopla para apagar la velita 💨</button>
</div>

</div>

<div id="cartaFinal" class="typing"></div>

<audio id="music" src="musica.mp3"></audio>

<script>

const texto = `
🎀 Feliz cumpleaños 🎀

Hoy el mundo se siente más bonito,
porque es tu día, Señorita Monse ✨

Eres una persona increíble 💖
de esas que iluminan sin esfuerzo

No cambies nunca 🌸

Esto fue hecho con mucho cariño 💛

Atentamente B
`;

function escribir(el, txt){
let i=0;
function t(){
if(i<txt.length){
el.innerHTML += txt.charAt(i);
i++;
setTimeout(t,30);
}
}
t();
}

function abrir(){
document.querySelector(".box").style.display="none";
let music=document.getElementById("music");
music.volume=1;
music.play().catch(()=>{});

setTimeout(()=>{
document.getElementById("msg1").style.display="block";
},800);

setTimeout(()=>{
document.getElementById("cake").style.display="block";
},1800);
}

/* 🎤 SOPLIDO REAL */
function iniciarSoplido(){

let audioContext = new (window.AudioContext || window.webkitAudioContext)();

navigator.mediaDevices.getUserMedia({ audio: true })
.then(stream => {

const mic = audioContext.createMediaStreamSource(stream);
const analyser = audioContext.createAnalyser();
mic.connect(analyser);

const data = new Uint8Array(analyser.frequencyBinCount);

function detectar(){

analyser.getByteFrequencyData(data);
let volumen = data.reduce((a,b)=>a+b)/data.length;

/* sensibilidad */
if(volumen > 50){
activarEfectoSoplido();
return;
}

requestAnimationFrame(detectar);
}

detectar();

})
.catch(err => {
console.log("Micrófono no permitido", err);
/* fallback */
activarEfectoSoplido();
});
}

/* 💨 EFECTO SOPLIDO */
function activarEfectoSoplido(){

let vela=document.getElementById("vela");
vela.style.opacity="0";

/* humo */
for(let i=0;i<5;i++){
let h=document.createElement("div");
h.className="humo";
h.innerText="💨";
h.style.left="50%";
h.style.top="50%";
document.body.appendChild(h);
setTimeout(()=>h.remove(),2000);
}

/* música suave */
fadeMusic();

/* transición */
setTimeout(()=>{
mostrarCarta();
},1200);
}

/* 🎵 fade suave */
function fadeMusic(){
let music=document.getElementById("music");
let vol=1;
let fade=setInterval(()=>{
if(vol>0.2){
vol-=0.05;
music.volume=vol;
}else{
clearInterval(fade);
}
},100);
}

/* 💌 carta */
function mostrarCarta(){

let inicio=document.getElementById("inicio");
inicio.style.opacity="0";
inicio.style.pointerEvents="none";

let carta=document.getElementById("cartaFinal");
carta.style.display="block";

carta.style.animation="none";
carta.offsetHeight;
carta.style.animation="abrir 1.5s forwards";

carta.innerHTML="";
escribir(carta,texto);
}

/* partículas */
for(let i=0;i<40;i++){
let p=document.createElement("div");
p.className="particle";
p.innerText=["🌸","💖","✨","🎀"][Math.floor(Math.random()*4)];
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(p);
}

/* pausa música */
document.addEventListener("visibilitychange", ()=>{
let m=document.getElementById("music");
if(document.hidden){m.pause();}
});

</script>

</body>
</html>
