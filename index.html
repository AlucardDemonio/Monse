<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Monse 🎀</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6e7,#fff0f6);
font-family:'Segoe UI',cursive;
overflow:hidden;
}

/* evitar bloqueos */
*{
pointer-events:auto;
}

/* partículas */
.particle{
position:absolute;
font-size:18px;
animation:floatUp linear infinite;
pointer-events:none;
}
@keyframes floatUp{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* caja */
.box{
width:120px;
height:120px;
background:#ff8fc1;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
font-size:40px;
color:white;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
animation:float 2s infinite;
z-index:5;
}
@keyframes float{50%{transform:translateY(-10px)}}

/* carta */
.letter{
display:none;
background:white;
padding:20px;
border-radius:20px;
width:85%;
max-width:320px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
font-style:italic;
text-align:center;
font-size:14px;
transform:scaleY(0);
transform-origin:top;
animation:openLetter 1.5s forwards;
z-index:6;
}
@keyframes openLetter{
0%{transform:scaleY(0)}
100%{transform:scaleY(1)}
}

/* typing */
.typing{
white-space:pre-line;
border-right:2px solid pink;
animation:blink 0.7s infinite;
}
@keyframes blink{
50%{border-color:transparent}
}

/* pastel */
.cake{
display:none;
text-align:center;
z-index:10;
position:relative;
}

/* botón vela */
.btn-vela{
margin-top:10px;
padding:10px 15px;
background:#ff4da6;
color:white;
border:none;
border-radius:20px;
font-size:18px;
cursor:pointer;
}

/* fuegos */
.fire{
position:absolute;
font-size:20px;
animation:boom 1s forwards;
pointer-events:none;
}
@keyframes boom{
to{transform:scale(2);opacity:0}
}
</style>
</head>

<body>

<div id="main">

<div class="box" onclick="abrir()">🎁</div>

<div id="msg1" class="letter">
Esto fue hecho especialmente para ti 💖<br><br>
Gracias por existir y ser tú ✨
</div>

<div id="cake" class="cake">
<div style="font-size:60px;">🎂</div>
<button class="btn-vela" onclick="vela()">Apagar velita 🔥</button>
</div>

<div id="msg2" class="letter typing"></div>

</div>

<audio id="music" src="musica.mp3"></audio>

<script>

const textoFinal = `
🎀 Feliz cumpleaños 🎀

Hoy el mundo se siente un poquito mejor,
porque es tu día, Señorita Monse ✨

Eres una persona increíble,
de esas que iluminan sin esfuerzo,
que hacen que todo se sienta más ligero 💖

No cambies nunca esa forma tan bonita de ser 🌸

Esto fue hecho con mucho cariño para ti 💛

Atentamente B
`;

function escribirTexto(el, texto){
let i=0;
function escribir(){
if(i < texto.length){
el.innerHTML += texto.charAt(i);
i++;
setTimeout(escribir, 35);
}
}
escribir();
}

function abrir(){
document.querySelector(".box").style.display="none";
document.getElementById("music").play().catch(()=>{});
explosion();

setTimeout(()=>{
document.getElementById("msg1").style.display="block";
},800);

setTimeout(()=>{
document.getElementById("cake").style.display="block";
},2000);
}

function vela(){
fuegos();

setTimeout(()=>{
let carta=document.getElementById("msg2");
carta.style.display="block";
carta.innerHTML="";
escribirTexto(carta, textoFinal);
},800);
}

/* partículas */
for(let i=0;i<40;i++){
let p=document.createElement("div");
p.className="particle";
p.innerText=["🌸","💖","✨","🎀"][Math.floor(Math.random()*4)];
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(p);
}

/* explosión */
function explosion(){
for(let i=0;i<25;i++){
let e=document.createElement("div");
e.className="fire";
e.innerText=["💖","✨","🎀"][Math.floor(Math.random()*3)];
e.style.left="50%";
e.style.top="50%";
document.body.appendChild(e);

let x=(Math.random()-0.5)*300;
let y=(Math.random()-0.5)*300;

e.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${x}px,${y}px)`,opacity:0}
],{duration:800});

setTimeout(()=>e.remove(),800);
}
}

/* fuegos */
function fuegos(){
for(let i=0;i<30;i++){
let f=document.createElement("div");
f.className="fire";
f.innerText=["💖","✨","🌸"][Math.floor(Math.random()*3)];
f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*80+"vh";
document.body.appendChild(f);
setTimeout(()=>f.remove(),1000);
}
}

/* pausa música */
document.addEventListener("visibilitychange", function() {
const music = document.getElementById("music");
if (document.hidden) {
music.pause();
}
});

</script>

</body>
</html>
