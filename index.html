<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Monse 🎀</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6e7,#fff0f6);
font-family:'Segoe UI',cursive;
overflow:hidden;
}

/* fondo estrellas */
.star{
position:absolute;
font-size:10px;
color:white;
animation:twinkle 2s infinite alternate;
}
@keyframes twinkle{
from{opacity:0.3}
to{opacity:1}
}

/* partículas */
.particle{
position:absolute;
font-size:18px;
animation:floatUp linear infinite;
}
@keyframes floatUp{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* caja */
.box{
width:150px;
height:150px;
background:#ff8fc1;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
font-size:50px;
color:white;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
animation:float 2s infinite;
}
@keyframes float{50%{transform:translateY(-10px)}}

/* carta */
.letter{
display:none;
background:white;
padding:20px;
border-radius:20px;
width:300px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
font-style:italic;
text-align:center;
animation:fade 1s ease;
}
@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

/* nombre brillo */
.name{
background:linear-gradient(90deg,#ff4da6,#ff99cc,#ff4da6);
background-size:200%;
-webkit-background-clip:text;
color:transparent;
animation:shine 3s linear infinite;
}
@keyframes shine{
to{background-position:200%}
}

/* pastel */
.cake{
display:none;
font-size:60px;
margin-top:15px;
cursor:pointer;
}

/* fuegos */
.fire{
position:absolute;
font-size:20px;
animation:boom 1s forwards;
}
@keyframes boom{
to{transform:scale(2);opacity:0}
}
</style>
</head>

<body>

<div id="main">

<div class="box" onclick="abrir()">🎁</div>

<div id="msg1" class="letter">
Esto fue hecho especialmente para ti 💖<br><br>
Gracias por existir y ser tú ✨
</div>

<div id="cake" class="cake" onclick="vela()">
🎂<br><small>Clic en la vela 🔥</small>
</div>

<div id="msg2" class="letter"></div>

</div>

<audio id="music" src="musica.mp3"></audio>

<script>

const textoFinal = `
🎀 Feliz cumpleaños 🎀 <br><br>

Hoy el mundo se siente un poquito mejor,<br>
porque es tu día, <span class="name">Señorita Monse</span> ✨<br><br>

Eres una persona increíble,<br>
de esas que iluminan sin esfuerzo,<br>
que hacen que todo se sienta más ligero 💖<br><br>

No cambies nunca esa forma tan bonita de ser 🌸<br><br>

Esto fue hecho con mucho cariño para ti 💛<br><br>

Atentamente B
`;

function abrir(){
document.querySelector(".box").style.display="none";

document.getElementById("music").play().catch(()=>{});

explosion();

setTimeout(()=>{
document.getElementById("msg1").style.display="block";
},800);

setTimeout(()=>{
document.getElementById("cake").style.display="block";
},2000);
}

function vela(){
fuegos();

setTimeout(()=>{
let carta=document.getElementById("msg2");
carta.style.display="block";
carta.innerHTML=textoFinal;
},1200);
}

/* partículas */
for(let i=0;i<40;i++){
let p=document.createElement("div");
p.className="particle";
p.innerText=["🌸","💖","✨","🎀"][Math.floor(Math.random()*4)];
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(p);
}

/* estrellas */
for(let i=0;i<30;i++){
let s=document.createElement("div");
s.className="star";
s.innerText="✨";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
document.body.appendChild(s);
}

/* explosión regalo */
function explosion(){
for(let i=0;i<25;i++){
let e=document.createElement("div");
e.className="fire";
e.innerText=["💖","✨","🎀"][Math.floor(Math.random()*3)];
e.style.left="50%";
e.style.top="50%";
document.body.appendChild(e);

let x=(Math.random()-0.5)*300;
let y=(Math.random()-0.5)*300;

e.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${x}px,${y}px)`,opacity:0}
],{duration:800});

setTimeout(()=>e.remove(),800);
}
}

/* fuegos finales */
function fuegos(){
for(let i=0;i<30;i++){
let f=document.createElement("div");
f.className="fire";
f.innerText=["💖","✨","🌸"][Math.floor(Math.random()*3)];
f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*80+"vh";
document.body.appendChild(f);
setTimeout(()=>f.remove(),1000);
}
}

</script>

</body>
</html>
